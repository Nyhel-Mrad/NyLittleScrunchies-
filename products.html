<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Produits</title>
<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

<h2>Nos produits</h2>

<!-- FILTRE -->
<div class="d-flex gap-3 mb-4 flex-wrap">
  <div class="flex-grow-1" style="max-width: 250px;">
    <label class="small fw-bold mb-1">Catégorie</label>
    <select id="filterCategory" class="form-select">
      <option value="all">Toutes catégories</option>
      <option value="scrunchies">Scrunchies</option>
      <option value="barrettes">Barrettes</option>
      <option value="sets">Sets</option>
    </select>
  </div>

  <div class="flex-grow-1" style="max-width: 250px;">
    <label class="small fw-bold mb-1">Trier par</label>
    <select id="sortPrice" class="form-select">
      <option value="default">Par défaut</option>
      <option value="asc">Prix croissant</option>
      <option value="desc">Prix décroissant</option>
    </select>
  </div>
</div>
<div class="row" id="productsContainer"></div>

</div>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
