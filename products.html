<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Produits</title>
<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm fixed-top">
  <div class="container">
    <a class="navbar-brand fw-bold fs-3" href="index.html">NyLittleWorld</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavProducts">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNavProducts">
      <ul class="navbar-nav mx-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Accueil</a></li>
        <li class="nav-item"><a class="nav-link" href="products.html">Produits</a></li>
        <li class="nav-item"><a class="nav-link" href="panier.html">Panier</a></li>
      </ul>
    </div>

    <div class="d-flex gap-3 align-items-center">
      <a href="panier.html" id="cartIconBtn" class="btn btn-gold position-relative">
        <i class="bi bi-bag"></i>
        <span id="cartCount" class="cart-badge">0</span>
      </a>
    </div>
  </div>
</nav>

<div class="container page-section">

<div class="d-flex flex-wrap align-items-end justify-content-between gap-3 mb-4">
  <div>
    <p class="text-uppercase text-muted small fw-semibold mb-1">Collection</p>
    <h2 class="mb-0">Nos produits</h2>
  </div>
</div>

<!-- FILTRE -->
<div class="d-flex gap-3 mb-4 flex-wrap">
  <div class="flex-grow-1" style="max-width: 250px;">
    <label class="small fw-bold mb-1">Catégorie</label>
    <select id="filterCategory" class="form-select">
      <option value="all">Toutes catégories</option>
      <option value="scrunchies">Scrunchies</option>
      <option value="barrettes">Barrettes</option>
      <option value="sets">Sets</option>
    </select>
  </div>

  <div class="flex-grow-1" style="max-width: 250px;">
    <label class="small fw-bold mb-1">Trier par</label>
    <select id="sortPrice" class="form-select">
      <option value="default">Par défaut</option>
      <option value="asc">Prix croissant</option>
      <option value="desc">Prix décroissant</option>
    </select>
  </div>
</div>
<div class="row" id="productsContainer"></div>

</div>

<script src="data.js"></script>
<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
