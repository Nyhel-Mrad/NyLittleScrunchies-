<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panier</title>
<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm fixed-top">
  <div class="container">
    <a class="navbar-brand fw-bold fs-3" href="index.html">NyLittleWorld</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavCart">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNavCart">
      <ul class="navbar-nav mx-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Accueil</a></li>
        <li class="nav-item"><a class="nav-link" href="products.html">Produits</a></li>
        <li class="nav-item"><a class="nav-link active" href="panier.html">Panier</a></li>
      </ul>
    </div>

    <div class="d-flex gap-3 align-items-center">
      <a href="panier.html" id="cartIconBtn" class="btn btn-gold position-relative">
        <i class="bi bi-bag"></i>
        <span id="cartCount" class="cart-badge">0</span>
      </a>
    </div>
  </div>
</nav>

<div class="container page-section cart-page">
  <div class="d-flex flex-wrap align-items-end justify-content-between gap-3 mb-4">
    <div>
      <p class="text-uppercase text-muted small fw-semibold mb-1">Récapitulatif</p>
      <h2 class="mb-0">Votre panier</h2>
    </div>
  </div>

  <div class="row g-4">
    <div class="col-lg-8">
      <div class="cart-panel h-100">
        <div id="emptyCart" class="cart-empty-state d-none">
          <i class="bi bi-bag-heart"></i>
          <h4 class="mt-3 mb-2">Votre panier est vide</h4>
          <p class="mb-0 text-muted">Ajoutez des pièces favorites pour construire votre commande.</p>
        </div>
        <div id="cartItems"></div>
      </div>
    </div>

    <div class="col-lg-4">
      <aside class="summary-card h-100">
        <p class="text-uppercase text-muted small fw-semibold mb-2">Résumé de la commande</p>
        <h3 class="mb-4">Total élégant</h3>

        <div class="summary-line">
          <span>Sous-total</span>
          <strong id="cartSubtotal">0DT</strong>
        </div>
        <div class="summary-line">
          <span>Frais de livraison</span>
          <strong id="cartShipping">0DT</strong>
        </div>

        <hr class="my-4">

        <div class="summary-line summary-total mb-4">
          <span>Total final</span>
          <strong id="cartTotal">0DT</strong>
        </div>

        <div id="checkoutSection" class="checkout-section d-none">
          <hr class="my-4">
          <p class="text-uppercase text-muted small fw-semibold mb-3">Livraison</p>

          <form id="checkoutForm" novalidate>
            <div class="mb-3">
              <label for="fullName" class="form-label fw-semibold">Nom complet</label>
              <input type="text" id="fullName" class="form-control checkout-input" placeholder="Ex: Amira Ben Ali">
              <div class="field-error" id="fullNameError"></div>
            </div>

            <div class="mb-3">
              <label for="phone" class="form-label fw-semibold">Numéro de téléphone</label>
              <input type="tel" id="phone" class="form-control checkout-input" maxlength="8" inputmode="numeric" placeholder="8 chiffres">
              <div class="field-error" id="phoneError"></div>
            </div>

            <div class="mb-3">
              <label for="governorate" class="form-label fw-semibold">Gouvernorat</label>
              <select id="governorate" class="form-select checkout-input">
                <option value="">Choisir un gouvernorat</option>
                <option>Ariana</option>
                <option>Béja</option>
                <option>Ben Arous</option>
                <option>Bizerte</option>
                <option>Gabès</option>
                <option>Gafsa</option>
                <option>Jendouba</option>
                <option>Kairouan</option>
                <option>Kasserine</option>
                <option>Kébili</option>
                <option>Le Kef</option>
                <option>Mahdia</option>
                <option>Manouba</option>
                <option>Médenine</option>
                <option>Monastir</option>
                <option>Nabeul</option>
                <option>Sfax</option>
                <option>Sidi Bouzid</option>
                <option>Siliana</option>
                <option>Sousse</option>
                <option>Tataouine</option>
                <option>Tozeur</option>
                <option>Tunis</option>
                <option>Zaghouan</option>
              </select>
              <div class="field-error" id="governorateError"></div>
            </div>

            <div class="mb-4">
              <label for="address" class="form-label fw-semibold">Adresse précise</label>
              <textarea id="address" class="form-control checkout-input" rows="3" placeholder="Rue, numéro, étage, code postal..."></textarea>
              <div class="field-error" id="addressError"></div>
            </div>

            <button type="submit" id="checkoutSubmitBtn" class="btn btn-gold w-100 btn-lg" disabled>
              <i class="bi bi-shield-check me-2"></i>Valider la commande
            </button>
          </form>
        </div>
      </aside>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
